name: Deploy Official Xray Latest Slim

on:
  workflow_dispatch: # 手动触发

jobs:
  deploy:
    name: Fetch Xray Latest for ${{ matrix.goarch }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goarch: amd64
            file_part: "64"
            target_name: "xray-linux-64"
          - goarch: arm64-v8a
            file_part: "arm64-v8a"
            target_name: "xray-linux-arm64-v8a"

    steps:
      # 1. 直接用官方的 latest 路径下载对应的 zip 包（不需要提前抓取 Tag）
      - name: Download Official Latest Zip
        run: |
          URL="https://github.com/XTLS/Xray-core/releases/latest/download/Xray-linux-${{ matrix.file_part }}.zip"
          curl -L -o xray.zip "$URL"

      # 2. 解压出纯二进制单文件并重命名（对应系统和架构）
      - name: Extract Binary
        run: |
          unzip xray.zip xray
          mv xray ${{ matrix.target_name }}
          chmod +x ${{ matrix.target_name }}

      # 3. 暂存产物
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.target_name }}
          path: ${{ matrix.target_name }}

  release:
    name: Create Release
    needs: deploy
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download All Artifacts
        uses: actions/download-artifact@v4
        with:
          path: ./artifacts

      # 4. 发布到你自己的 Release 页面，Tag 直接锁定为 latest
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "latest"
          name: "Xray Official Latest"
          body: "从 XTLS 官方 releases/latest 直接动态提取并重命名的解压单文件。专为 64M 小内存优化。"
          draft: false
          prerelease: false
          files: |
            ./artifacts/xray-linux-64/xray-linux-64
            ./artifacts/xray-linux-arm64-v8a/xray-linux-arm64-v8a
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}