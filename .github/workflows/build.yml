name: Build Micro Sing-Box

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

jobs:
  build:
    name: Build sing-box for ${{ matrix.goarch }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goarch: amd64
            suffix: 64
          - goarch: arm64
            suffix: arm64-v8a

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          repository: 'SagerNet/sing-box' # 拉取 sing-box 官方源码
          ref: ${{ github.ref_type == 'tag' && github.ref_name || 'main-next' }}
          fetch-depth: 1

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: 'stable'

      - name: Build sing-box (Micro Mode)
        # 🎯 核心绝招：-tags 只保留 vless 和 websocket，连 tls 都不带！
        run: |
          CGO_ENABLED=0 GOOS=linux GOARCH=${{ matrix.goarch }} go build -v -trimpath \
            -tags "with_vless with_websocket" \
            -ldflags="-s -w -buildid=" \
            -o sing-box-linux-${{ matrix.suffix }} \
            ./cmd/sing-box

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: sing-box-linux-${{ matrix.suffix }}
          path: sing-box-linux-${{ matrix.suffix }}

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write
    steps:
      - name: Download All Artifacts
        uses: actions/download-artifact@v4
        with:
          path: ./artifacts

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: "Sing-Box Micro ${{ github.ref_name }}"
          draft: false
          prerelease: false
          files: |
            ./artifacts/sing-box-linux-64/sing-box-linux-64
            ./artifacts/sing-box-linux-arm64-v8a/sing-box-linux-arm64-v8a
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}