name: Deploy Official Xray Latest Slim

on:
  workflow_dispatch: # 手动触发

jobs:
  deploy:
    name: Fetch Xray Latest for ${{ matrix.goarch }}
    runs-on: ubuntu-latest
    outputs:
      xray_version: ${{ steps.get_version.outputs.version }}
    strategy:
      matrix:
        include:
          - goarch: amd64
            file_part: "64"
            pkg_name: "xray-linux-64"
          - goarch: arm64-v8a
            file_part: "arm64-v8a"
            pkg_name: "xray-linux-arm64-v8a"

    steps:
      # 1. 抓取真实版本号
      - name: Get Real Latest Version Tag
        id: get_version
        run: |
          REAL_TAG=$(curl -sI https://github.com/XTLS/Xray-core/releases/latest | grep -i "location:" | awk -F'/' '{print $NF}' | tr -d '\r\n')
          echo "version=$REAL_TAG" >> $GITHUB_OUTPUT

      # 2. 下载官方对应的 zip 包
      - name: Download Official Zip
        run: |
          URL="https://github.com/XTLS/Xray-core/releases/download/${{ steps.get_version.outputs.version }}/Xray-linux-${{ matrix.file_part }}.zip"
          curl -L -o xray.zip "$URL"

      # 3. 仅仅解压出名为 xray 的核心二进制文件（不进行任何重命名）
      - name: Extract Binary
        run: |
          unzip xray.zip xray
          chmod +x xray

      # 4. 用各自架构的包名封装这个 xray 文件
      - name: Pack to Gzip
        run: |
          tar -czvf ${{ matrix.pkg_name }}.tar.gz xray

      # 5. 暂存压缩包
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.pkg_name }}-archive
          path: ${{ matrix.pkg_name }}.tar.gz

  release:
    name: Create Release
    needs: deploy
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download All Artifacts
        uses: actions/download-artifact@v4
        with:
          path: ./artifacts

      # 6. 发布压缩后的 .tar.gz 文件到自己的 Release
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.deploy.outputs.xray_version }}
          name: "Xray Official ${{ needs.deploy.outputs.xray_version }}"
          body: "官方最新版本 ${{ needs.deploy.outputs.xray_version }}。完美适配 64M 小内存 Alpine 容器。下载体积约 10MB，解压后单文件名为 xray。"
          draft: false
          prerelease: false
          files: |
            ./artifacts/xray-linux-64-archive/xray-linux-64.tar.gz
            ./artifacts/xray-linux-arm64-v8a-archive/xray-linux-arm64-v8a.tar.gz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}