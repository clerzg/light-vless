name: Deploy Official Xray Latest Slim

on:
  workflow_dispatch: # 手动触发

jobs:
  deploy:
    name: Fetch Xray Latest for ${{ matrix.goarch }}
    runs-on: ubuntu-latest
    outputs:
      xray_version: ${{ steps.get_version.outputs.version }}
    strategy:
      matrix:
        include:
          - goarch: amd64
            file_part: "64"
            target_name: "xray-linux-64"
          - goarch: arm64-v8a
            file_part: "arm64-v8a"
            target_name: "xray-linux-arm64-v8a"

    steps:
      # 1. 核心魔术：直接抓取官方最新版本的真实 Tag 名字并存入变量
      - name: Get Real Latest Version Tag
        id: get_version
        run: |
          REAL_TAG=$(curl -sI https://github.com/XTLS/Xray-core/releases/latest | grep -i "location:" | awk -F'/' '{print $NF}' | tr -d '\r\n')
          echo "检测到官方最新版本号为: $REAL_TAG"
          echo "version=$REAL_TAG" >> $GITHUB_OUTPUT

      # 2. 动态下载对应版本的 zip 包
      - name: Download Official Zip
        run: |
          URL="https://github.com/XTLS/Xray-core/releases/download/${{ steps.get_version.outputs.version }}/Xray-linux-${{ matrix.file_part }}.zip"
          curl -L -o xray.zip "$URL"

      # 3. 解压并重命名文件
      - name: Extract Binary
        run: |
          unzip xray.zip xray
          mv xray ${{ matrix.target_name }}
          chmod +x ${{ matrix.target_name }}

      # 4. 暂存产物
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.target_name }}
          path: ${{ matrix.target_name }}

  release:
    name: Create Release
    needs: deploy
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download All Artifacts
        uses: actions/download-artifact@v4
        with:
          path: ./artifacts

      # 5. 发布到你自己的 Release 页面，Tag 自动变为真实的官方版本号
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.deploy.outputs.xray_version }}
          name: "Xray Official ${{ needs.deploy.outputs.xray_version }}"
          body: "基于官方最新版本 ${{ needs.deploy.outputs.xray_version }} 自动提取并重命名的解压单文件。专为 64M 小内存优化。"
          draft: false
          prerelease: false
          files: |
            ./artifacts/xray-linux-64/xray-linux-64
            ./artifacts/xray-linux-arm64-v8a/xray-linux-arm64-v8a
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}