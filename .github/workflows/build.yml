name: Build Extreme Mini Sing-Box

on:
  workflow_dispatch: # 支持网页手动点击运行

jobs:
  build:
    name: Build sing-box for ${{ matrix.goarch }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goarch: amd64
            suffix: "64"
          - goarch: arm64
            suffix: "arm64-v8a"

    steps:
      # 1. 自动去官方仓库抓取最新的稳定 Release Tag 名字
      - name: Get Latest sing-box Release
        id: sing_box_latest
        uses: pozetroninc/github-action-get-latest-release@v0.8.0
        with:
          repository: SagerNet/sing-box
          excludes: prerelease, draft

      # 2. 克隆官方对应最新版本的源码
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          repository: 'SagerNet/sing-box'
          ref: ${{ steps.sing_box_latest.outputs.release }}
          fetch-depth: 1

      # 3. 锁死在最轻量的 Go 1.22 版本
      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      # 4. 安装 Linux 终极压缩工具 UPX
      - name: Install UPX
        run: sudo apt-get update && sudo apt-get install -y upx-ucl

      # 5. 使用 none 深度洗白标签进行极致编译，并修改对应架构的文件名
      - name: Build with Extreme Slim Tags
        run: |
          CGO_ENABLED=0 GOOS=linux GOARCH=${{ matrix.goarch }} go build -v -trimpath \
            -tags "none in_vless out_vless in_direct out_direct out_block mechanism_transport_http mechanism_transport_websocket" \
            -ldflags="-s -w -buildid=" \
            -o sing-box-linux-${{ matrix.suffix }} \
            ./cmd/sing-box

      # 6. 使用 LZMA 算法进行极限物理压榨，冲向 6.5MB 终极体型
      - name: UPX Ultra Compress
        run: upx --best --lzma sing-box-linux-${{ matrix.suffix }}

      # 7. 临时暂存产物
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: sing-box-linux-${{ matrix.suffix }}
          path: sing-box-linux-${{ matrix.suffix }}

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write # 确保拥有发布 Release 的权限
    steps:
      - name: Get Latest Tag Again
        id: sing_box_latest_rel
        uses: pozetroninc/github-action-get-latest-release@v0.8.0
        with:
          repository: SagerNet/sing-box
          excludes: prerelease, draft

      - name: Download All Artifacts
        uses: actions/download-artifact@v4
        with:
          path: ./artifacts

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.sing_box_latest_rel.outputs.release }}
          name: "Sing-Box Micro ${{ steps.sing_box_latest_rel.outputs.release }}"
          draft: false
          prerelease: false
          files: |
            ./artifacts/sing-box-linux-64/sing-box-linux-64
            ./artifacts/sing-box-linux-arm64-v8a/sing-box-linux-arm64-v8a
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}