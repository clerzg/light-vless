name: Build Micro Sing-Box

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

jobs:
  build:
    name: Build sing-box for ${{ matrix.goarch }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goarch: amd64
            suffix: 64
          - goarch: arm64
            suffix: arm64-v8a

    steps:
      - name: Get Latest sing-box Release
        id: sing_box_latest
        if: github.ref_type != 'tag'
        uses: pozetroninc/github-action-get-latest-release@v0.8.0
        with:
          repository: SagerNet/sing-box
          excludes: prerelease, draft

      - name: Set Target Version
        id: version
        run: |
          if [ "${{ github.ref_type }}" = "tag" ]; then
            echo "target_ref=${{ github.ref_name }}" >> $GITHUB_OUTPUT
            echo "release_tag=${{ github.ref_name }}" >> $GITHUB_OUTPUT
          else
            echo "target_ref=${{ steps.sing_box_latest.outputs.release }}" >> $GITHUB_OUTPUT
            echo "release_tag=${{ steps.sing_box_latest.outputs.release }}" >> $GITHUB_OUTPUT
          fi

      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          repository: 'SagerNet/sing-box'
          ref: ${{ steps.version.outputs.target_ref }}
          fetch-depth: 1

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: 'stable'

      - name: Build sing-box and Compress with UPX
        run: |
          CGO_ENABLED=0 GOOS=linux GOARCH=${{ matrix.goarch }} go build -v -trimpath -tags "with_vless with_websocket" -ldflags="-s -w -buildid=" -o sing-box-linux-${{ matrix.suffix }} ./cmd/sing-box
          sudo apt-get update && sudo apt-get install -y upx-ucl
          upx --best sing-box-linux-${{ matrix.suffix }}

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: sing-box-linux-${{ matrix.suffix }}
          path: sing-box-linux-${{ matrix.suffix }}

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Get Latest sing-box Release for Release Job
        id: sing_box_latest_rel
        if: github.ref_type != 'tag'
        uses: pozetroninc/github-action-get-latest-release@v0.8.0
        with:
          repository: SagerNet/sing-box
          excludes: prerelease, draft

      - name: Set Release Tag
        id: rel_version
        run: |
          if [ "${{ github.ref_type }}" = "tag" ]; then
            echo "release_tag=${{ github.ref_name }}" >> $GITHUB_OUTPUT
          else
            echo "release_tag=${{ steps.sing_box_latest_rel.outputs.release }}" >> $GITHUB_OUTPUT
          fi

      - name: Download All Artifacts
        uses: actions/download-artifact@v4
        with:
          path: ./artifacts

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.rel_version.outputs.release_tag }}
          name: "Sing-Box Micro ${{ steps.rel_version.outputs.release_tag }}"
          draft: false
          prerelease: false
          files: |
            ./artifacts/sing-box-linux-64/sing-box-linux-64
            ./artifacts/sing-box-linux-arm64-v8a/sing-box-linux-arm64-v8a
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}