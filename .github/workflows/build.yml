name: Build Extreme Mini Xray

on:
  workflow_dispatch: # 支持网页手动点击运行

jobs:
  build:
    name: Build Xray for ${{ matrix.goarch }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goarch: amd64
            suffix: "64"
          - goarch: arm64
            suffix: "arm64-v8a"

    steps:
      # 1. 获取最新 Tag
      - name: Get Latest Xray Release
        id: xray_latest
        uses: pozetroninc/github-action-get-latest-release@v0.8.0
        with:
          repository: XTLS/Xray-core
          excludes: prerelease, draft

      # 2. 克隆源码
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          repository: 'XTLS/Xray-core'
          ref: ${{ steps.xray_latest.outputs.release }}
          fetch-depth: 1

      # 3. 设置 Go 1.22
      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      # 4. 🩸 核心大招：物理删除不需要的协议和组件源码，强行瘦身 🩸
      - name: Physical Slimming Source Code
        run: |
          cd proxy
          # 物理删除几乎占了一半体积的 shadowsocks、shadowsocks_2022、trojan、vmess、vless(非ws部分) 等
          # 注意：为了确保能够顺利编译通过，我们只删掉可以安全解耦的独立协议包
          rm -rf shadowsocks shadowsocks_2022 trojan vmess loopback freedom
          
          # 重新创建一个极其简单的 freedom (直连) 协议占位，防止编译报错
          mkdir freedom && cd freedom
          echo 'package freedom' > config.go
          
          cd ../..
          echo "源码物理裁剪完成！"

      # 5. 纯净编译 (暂不使用 UPX)
      - name: Build Xray (Raw Slim Mode)
        run: |
          CGO_ENABLED=0 GOOS=linux GOARCH=${{ matrix.goarch }} go build -v -trimpath \
            -ldflags="-s -w -buildid=" \
            -o xray-linux-${{ matrix.suffix }} \
            ./main

      # 6. 上传产物
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: xray-linux-${{ matrix.suffix }}
          path: xray-linux-${{ matrix.suffix }}

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Get Latest Tag Again
        id: xray_latest_rel
        uses: pozetroninc/github-action-get-latest-release@v0.8.0
        with:
          repository: XTLS/Xray-core
          excludes: prerelease, draft

      - name: Download All Artifacts
        uses: actions/download-artifact@v4
        with:
          path: ./artifacts

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.xray_latest_rel.outputs.release }}
          name: "Xray Slim ${{ steps.xray_latest_rel.outputs.release }}"
          draft: false
          prerelease: false
          files: |
            ./artifacts/xray-linux-64/xray-linux-64
            ./artifacts/xray-linux-arm64-v8a/xray-linux-arm64-v8a
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}