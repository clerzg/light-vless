name: Build Slim Xray

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

jobs:
  build:
    name: Build Xray for ${{ matrix.goarch }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goarch: amd64
            suffix: 64
          - goarch: arm64
            suffix: arm64-v8a

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          repository: 'XTLS/Xray-core'
          ref: ${{ github.ref_type == 'tag' && github.ref_name || '' }}
          fetch-depth: 1

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: 'stable'

      - name: Build Xray (Slim Mode)
        run: CGO_ENABLED=0 GOOS=linux GOARCH=${{ matrix.goarch }} go build -v -trimpath -ldflags="-s -w -buildid=" -o xray-linux-${{ matrix.suffix }} ./main

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: xray-linux-${{ matrix.suffix }}
          path: xray-linux-${{ matrix.suffix }}

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write
    steps:
      - name: Download All Artifacts
        uses: actions/download-artifact@v4
        with:
          path: ./artifacts

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: "Xray Slim ${{ github.ref_name }}"
          draft: false
          prerelease: false
          files: |
            ./artifacts/xray-linux-64/xray-linux-64
            ./artifacts/xray-linux-arm64-v8a/xray-linux-arm64-v8a
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
