name: Build Extreme Mini Xray

on:
  workflow_dispatch: # 支持网页手动点击运行

jobs:
  build:
    name: Build Xray for ${{ matrix.goarch }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goarch: amd64
            suffix: "64"
          - goarch: arm64
            suffix: "arm64-v8a"

    steps:
      # 1. 获取最新 Tag
      - name: Get Latest Xray Release
        id: xray_latest
        uses: pozetroninc/github-action-get-latest-release@v0.8.0
        with:
          repository: XTLS/Xray-core
          excludes: prerelease, draft

      # 2. 克隆源码
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          repository: 'XTLS/Xray-core'
          ref: ${{ steps.xray_latest.outputs.release }}
          fetch-depth: 1

      # 3. 设置 Go 1.22
      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      # 4. 割肉编译 (开启 confonly 标签，暂不使用 UPX)
      - name: Build Xray (ConfOnly Mode)
        run: |
          CGO_ENABLED=0 GOOS=linux GOARCH=${{ matrix.goarch }} go build -v -trimpath \
            -tags "confonly" \
            -ldflags="-s -w -buildid=" \
            -o xray-linux-${{ matrix.suffix }} \
            ./main

      # 5. 上传产物
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: xray-linux-${{ matrix.suffix }}
          path: xray-linux-${{ matrix.suffix }}

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Get Latest Tag Again
        id: xray_latest_rel
        uses: pozetroninc/github-action-get-latest-release@v0.8.0
        with:
          repository: XTLS/Xray-core
          excludes: prerelease, draft

      - name: Download All Artifacts
        uses: actions/download-artifact@v4
        with:
          path: ./artifacts

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.xray_latest_rel.outputs.release }}
          name: "Xray Slim ${{ steps.xray_latest_rel.outputs.release }}"
          draft: false
          prerelease: false
          files: |
            ./artifacts/xray-linux-64/xray-linux-64
            ./artifacts/xray-linux-arm64-v8a/xray-linux-arm64-v8a
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}